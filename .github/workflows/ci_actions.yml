name: Docker Test with Pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kubsu"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for test
        run: |
          docker build -t app-test --target builder .

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U kubsu; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run tests inside Docker container
        run: |
          docker run --rm \
            --network host \
            -e POSTGRES_USER=kubsu \
            -e POSTGRES_PASSWORD=kubsu \
            -e POSTGRES_DB=kubsu \
            -e DATABASE_URL=postgresql://kubsu:kubsu@localhost:5432/kubsu \
            app-test \
            pytest --disable-warnings -v
